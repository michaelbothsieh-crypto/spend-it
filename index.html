<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錢包放血室 — 反正錢留著也會貶值</title>
<meta name="description" content="剛領到獎金不知道花在哪?讓厭世小助手循序漸進幫你把錢燒掉。">
<style>
:root {
  --bg: #09090b;
  --surface: #18181b;
  --surface-2: #27272a;
  --border: #3f3f46;
  --border-subtle: rgba(63, 63, 70, 0.5);
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-dim: rgba(59, 130, 246, 0.12);
  --accent-glow: rgba(59, 130, 246, 0.25);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
}
::selection { background: var(--accent-dim); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.wrap {
  width: 100%;
  max-width: 720px;
  padding: 48px 20px 80px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* ── header ── */
.logo {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 8px;
  cursor: pointer;
  user-select: none;
}
.logo b { color: var(--accent); }

/* ── screens ── */
.screen { display: none; animation: pop .35s cubic-bezier(.2,.9,.3,1.2); }
.screen.active { display: block; }
@keyframes pop {
  from { opacity: 0; transform: translateY(16px) scale(.98); }
  to { opacity: 1; transform: none; }
}

h1 {
  font-size: clamp(28px, 6vw, 44px);
  text-align: center;
  margin: 40px 0 12px;
  line-height: 1.3;
}
h2 {
  font-size: clamp(22px, 5vw, 30px);
  text-align: center;
  margin: 32px 0 6px;
  line-height: 1.4;
}
.sub {
  text-align: center;
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 36px;
  line-height: 1.7;
}
.sub small { color: var(--text-muted); }

.big-emoji { font-size: 72px; text-align: center; display: block; margin-top: 24px; animation: float 3s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}

/* ── progress ── */
.progress {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 28px;
}
.progress i {
  width: 28px; height: 4px;
  border-radius: 2px;
  background: var(--surface-2);
  transition: background .3s;
}
.progress i.on { background: var(--accent); }

/* ── option cards ── */
.opts { display: flex; flex-direction: column; gap: 12px; }
.opt {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  color: var(--text-primary);
  font: inherit;
  transition: transform .15s, border-color .15s, background .15s;
}
.opt:hover {
  transform: translateX(6px);
  border-color: var(--accent);
  background: var(--accent-dim);
}
.opt:active { transform: translateX(6px) scale(.98); }
.opt .ico { font-size: 32px; flex-shrink: 0; }
.opt .t { font-size: 17px; font-weight: 600; margin-bottom: 3px; }
.opt .d { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

.btn {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  border: none;
  font: inherit;
  font-size: 17px;
  font-weight: 700;
  padding: 16px 40px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform .15s, background .15s, box-shadow .15s;
  box-shadow: 0 0 0 0 var(--accent-glow);
}
.btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
.btn:active { transform: scale(.97); }
.btn.ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  box-shadow: none;
  font-weight: 500;
}
.btn.ghost:hover { color: var(--text-primary); border-color: var(--text-muted); }
.center { text-align: center; }
.back {
  background: none; border: none; color: var(--text-muted);
  font: inherit; font-size: 13px; cursor: pointer;
  margin-top: 24px; padding: 8px;
}
.back:hover { color: var(--text-secondary); }

/* ── results ── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 14px;
  margin-top: 8px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 22px 18px 18px;
  display: flex;
  flex-direction: column;
  animation: pop .4s cubic-bezier(.2,.9,.3,1.2) backwards;
  transition: transform .15s, border-color .15s;
}
.card:hover { transform: translateY(-4px); border-color: var(--border); }
.card:nth-child(2) { animation-delay: .05s; }
.card:nth-child(3) { animation-delay: .1s; }
.card:nth-child(4) { animation-delay: .15s; }
.card:nth-child(5) { animation-delay: .2s; }
.card:nth-child(6) { animation-delay: .25s; }
.card .pic { font-size: 46px; margin-bottom: 12px; }
.card .name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.card .desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; flex: 1; margin-bottom: 12px; }
.card .price {
  font-size: 15px; font-weight: 700; color: var(--accent-hover);
  margin-bottom: 12px;
}
.card .links { display: flex; gap: 8px; }
.card .links a {
  flex: 1;
  text-align: center;
  font-size: 13px;
  text-decoration: none;
  color: var(--text-secondary);
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  padding: 8px 0;
  transition: background .15s, color .15s;
}
.card .links a:hover { background: var(--accent); color: #fff; }

.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
  flex-wrap: wrap;
}

footer {
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  padding: 20px;
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo" onclick="go('intro')">💸 錢包<b>放血</b>室</div>

  <!-- intro -->
  <section class="screen active" id="s-intro">

  </section>

      </button>
      <button class="opt" onclick="pick('who','home')">
        <span class="ico">🏠</span>
        <span><span class="t">升級我的窩</span>
        <span class="d">家是避風港,港口設施該更新了。</span></span>
      </button>
      <button class="opt" onclick="pick('who','gift')">
        <span class="ico">🎁</span>
        <span><span class="t">送禮做人情</span>
        <span class="d">人情世故是一種投資,報酬率不明但不投會死。</span></span>
      </button>
    </div>
    <div class="progress"><i class="on"></i><i class="on"></i><i></i></div>
    <div class="center"><button class="back" onclick="go('q1')">← 回上一題</button></div>
  </section>

  <!-- q3: mood -->
  <section class="screen" id="s-q3">
    <h2>🧠 現在是什麼心情?</h2>
    <p class="sub">購物是心理治療,先掛號再拿藥。</p>
    <div class="opts">
      <button class="opt" onclick="pick('mood','chill')">
        <span class="ico">😩</span>
        <span><span class="t">累爆,想耍廢</span>
        <span class="d">上班已經用光所有力氣,只想癱著當一灘泥。</span></span>
      </button>
      <button class="opt" onclick="pick('mood','up')">
        <span class="ico">✨</span>
        <span><span class="t">想升級生活品質</span>
        <span class="d">覺得自己值得過得更好一點,哪怕只有 3%。</span></span>
      </button>
      <button class="opt" onclick="pick('mood','dumb')">
        <span class="ico">🤪</span>
        <span><span class="t">想買蠢東西</span>
        <span class="d">實用性?不存在的。快樂就是要沒有理由。</span></span>
      </button>
    </div>
    <div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i></div>
    <div class="center"><button class="back" onclick="go('q2')">← 回上一題</button></div>
  </section>

  <!-- results -->
  <section class="screen" id="s-result">
    <h2 id="r-title">🎉 診斷完畢</h2>
    <p class="sub" id="r-sub"></p>
    <div class="cards" id="r-cards"></div>
    <div class="result-actions">
      <button class="btn ghost" onclick="reroll()">🎲 都不喜歡,重抽</button>
      <button class="btn" onclick="restart()">🔄 重新診斷</button>
    </div>
  </section>
</div>

<footer>
  價格為大概區間,實際以賣場為準。連結是搜尋頁,買貴了別怪我。<br>
  本站不負責你的財務狀況,它本來就沒救了。
</footer>

['⌚','智慧手錶','花五位數買一個提醒你「該站起來了」的錶,很合理。','NT$ 5,000~15,000','l','self,gift','up','智慧手錶'],
['🧖‍♀️','按摩椅墊','把沙發升級成按摩椅,家裡最搶手的座位誕生了。','NT$ 3,000~10,000','l','home,gift','chill','按摩椅墊'],

['🧳','高質感行李箱','買了新行李箱,旅行的藉口就自己長出來了。','NT$ 3,000~10,000','l','self,gift','up','行李箱'],
['☕','義式咖啡機','在家開咖啡廳,回本要 300 杯,但夢想無價(自我催眠)。','NT$ 5,000~20,000','l','self,home','up,dumb','義式咖啡機'],
];

const subLines = {
  chill: '診斷結果:過勞。處方箋如下,健保不給付,錢包自付。',
  up: '診斷結果:生活品質缺乏症。以下藥物長期服用效果更佳。',
  dumb: '診斷結果:太理性太久了。以下純快樂製劑,不含任何實用成分。',
};

const state = { tier: null, who: null, mood: null };
let pool = [], shown = [];

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  window.scrollTo({ top: 0 });
}

function pick(key, val) {
  state[key] = val;
  if (key === 'tier') go('q2');
  else if (key === 'who') go('q3');
  else showResults();
}

function match(p) {
  return p[4] === state.tier && p[5].includes(state.who) && p[6].includes(state.mood);
}

function showResults() {
  pool = P.filter(match);
  // ponytail: 組合太冷門時放寬 mood 條件,保底至少 3 張卡
  if (pool.length < 3) {
    const extra = P.filter(p => p[4] === state.tier && p[5].includes(state.who) && !pool.includes(p));
    pool = pool.concat(extra);
  }
  shown = [];
  document.getElementById('r-sub').textContent = subLines[state.mood];
  draw();
  go('result');
}

function draw() {
  let candidates = pool.filter(p => !shown.includes(p));
  if (candidates.length < 3) { shown = []; candidates = pool; }
  const picked = candidates.sort(() => Math.random() - .5).slice(0, 6);
  shown = shown.concat(picked);
  document.getElementById('r-cards').innerHTML = picked.map(p => `
    <div class="card">
      <div class="pic">${p[0]}</div>
      <div class="name">${p[1]}</div>
      <div class="desc">${p[2]}</div>
      <div class="price">${p[3]}</div>
      <div class="links">
        <a href="https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${encodeURIComponent(p[7])}" target="_blank" rel="noopener">momo</a>
        <a href="https://shopee.tw/search?keyword=${encodeURIComponent(p[7])}" target="_blank" rel="noopener">蝦皮</a>
      </div>
    </div>`).join('');
}

function reroll() {
  draw();
  window.scrollTo({ top: 0 });
}

function restart() {
  state.tier = state.who = state.mood = null;
  go('q1');
}
</script>
