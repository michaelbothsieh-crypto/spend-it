<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錢包放血室 — 反正錢留著也會貶值</title>
<meta name="description" content="剛領到獎金不知道花在哪？讓厭世小助手循序漸進幫你把錢燒掉。">
<meta property="og:title" content="錢包放血室">
<meta property="og:description" content="回答三個問題，厭世小助手幫你決定這筆錢的歸宿。反正存著也買不起房。">
<meta property="og:type" content="website">
<meta name="theme-color" content="#09090b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2' stroke-linecap='round'%3E%3Crect x='3' y='6' width='18' height='13' rx='3'/%3E%3Cpath d='M3 10h18'/%3E%3Ccircle cx='16.5' cy='14.5' r='1.4' fill='%233b82f6'/%3E%3C/svg%3E">
<style>
:root {
  --bg: #09090b;
  --surface: #18181b;
  --surface-2: #27272a;
  --border: #3f3f46;
  --border-subtle: rgba(63, 63, 70, 0.5);
  --text-primary: #f4f4f5;
  --text-secondary: #a1a1aa;
  --text-muted: #71717a;
  --accent: #3b82f6;
  --accent-hover: #60a5fa;
  --accent-dim: rgba(59, 130, 246, 0.12);
  --accent-glow: rgba(59, 130, 246, 0.25);
  --gold: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: system-ui, -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(600px 400px at 15% -5%, rgba(59,130,246,.09), transparent 70%),
    radial-gradient(500px 350px at 90% 10%, rgba(251,191,36,.05), transparent 70%);
  z-index: 0;
}
::selection { background: var(--accent-dim); }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--radius-sm); }

/* ── icon system ── */
.icon {
  width: 1em; height: 1em;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.7;
  stroke-linecap: round;
  stroke-linejoin: round;
  vertical-align: -0.12em;
  flex-shrink: 0;
}
/* 每卡主題色 */
.h-blue { color: #60a5fa; }
.h-gold { color: #fbbf24; }
.h-green { color: #4ade80; }
.h-pink { color: #f472b6; }
.h-purple { color: #a78bfa; }
.h-orange { color: #fb923c; }
.h-red { color: #f87171; }

.wrap {
  width: 100%;
  max-width: 720px;
  padding: 40px 20px 60px;
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

/* ── header ── */
.logo {
  font-size: 14px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-align: center;
  margin-bottom: 4px;
  cursor: pointer;
  user-select: none;
  transition: color .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.logo:hover { color: var(--text-secondary); }
.logo b { color: var(--accent); }
.logo .icon { font-size: 17px; color: var(--accent); }

/* ── screens ── */
.screen { display: none; }
.screen.active { display: block; animation: pop .4s cubic-bezier(.2,.9,.3,1.2); }
@keyframes pop {
  from { opacity: 0; transform: translateY(16px) scale(.98); }
  to { opacity: 1; transform: none; }
}

h1 {
  font-size: clamp(30px, 6.5vw, 48px);
  text-align: center;
  margin: 28px 0 14px;
  line-height: 1.25;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #f4f4f5 30%, #93c5fd 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
h2 {
  font-size: clamp(23px, 5vw, 32px);
  text-align: center;
  margin: 24px 0 8px;
  line-height: 1.4;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
h2 .icon { font-size: .92em; color: var(--accent-hover); }
.sub {
  text-align: center;
  color: var(--text-secondary);
  font-size: 15px;
  margin-bottom: 32px;
  line-height: 1.8;
}
.sub small { color: var(--text-muted); font-size: 13px; }

/* hero */
.hero {
  display: grid;
  place-items: center;
  margin-top: 20px;
}
.hero svg {
  width: 110px; height: 110px;
  color: var(--gold);
  stroke-width: 1.4;
  filter: drop-shadow(0 12px 28px rgba(251,191,36,.18));
  animation: float 3.2s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-12px) rotate(3deg); }
}
.hero .bill {
  position: absolute;
  color: var(--accent-hover);
  opacity: 0;
  animation: billfly 2.6s ease-in infinite;
}
.hero .bill svg { width: 26px; height: 26px; animation: none; filter: none; }
.hero .bill:nth-child(2) { animation-delay: .9s; }
.hero .bill:nth-child(3) { animation-delay: 1.7s; color: var(--gold); }
@keyframes billfly {
  0% { opacity: 0; transform: translate(0, 6px) rotate(0); }
  25% { opacity: .9; }
  100% { opacity: 0; transform: translate(70px, -78px) rotate(40deg); }
}

/* inflation ticker */
.ticker {
  margin: 0 auto 32px;
  width: fit-content;
  font-size: 13px;
  color: var(--text-muted);
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 999px;
  padding: 8px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ticker b {
  color: #f87171;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.ticker .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #f87171;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: .2; } }

/* ── progress ── */
.progress {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin: 4px 0 24px;
}
.progress i {
  width: 34px; height: 4px;
  border-radius: 2px;
  background: var(--surface-2);
  transition: background .4s, box-shadow .4s;
}
.progress i.on { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

.qtag {
  display: block;
  text-align: center;
  font-size: 12px;
  letter-spacing: 3px;
  color: var(--text-muted);
  margin-top: 20px;
}

/* ── option cards ── */
.opts { display: flex; flex-direction: column; gap: 12px; }
.opt {
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 18px 20px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  color: var(--text-primary);
  font: inherit;
  position: relative;
  transition: transform .16s, border-color .16s, background .16s, box-shadow .16s;
  animation: slidein .4s cubic-bezier(.2,.9,.3,1.1) backwards;
}
.screen.active .opt:nth-child(1) { animation-delay: .05s; }
.screen.active .opt:nth-child(2) { animation-delay: .12s; }
.screen.active .opt:nth-child(3) { animation-delay: .19s; }
@keyframes slidein {
  from { opacity: 0; transform: translateX(-14px); }
  to { opacity: 1; transform: none; }
}
.opt:hover, .opt:focus-visible {
  transform: translateX(6px);
  border-color: var(--accent);
  background: linear-gradient(90deg, var(--accent-dim), var(--surface) 70%);
  box-shadow: -4px 0 16px -6px var(--accent-glow);
}
.opt:active { transform: translateX(6px) scale(.98); }
.opt .ico {
  flex-shrink: 0;
  width: 54px; height: 54px;
  display: grid; place-items: center;
  background: color-mix(in srgb, currentColor 10%, var(--surface-2));
  border-radius: var(--radius);
  transition: transform .2s;
  font-size: 27px;
}
.opt:hover .ico { transform: scale(1.12) rotate(-6deg); }
.opt .t { font-size: 17px; font-weight: 700; margin-bottom: 3px; display: block; color: var(--text-primary); }
.opt .d { font-size: 13px; color: var(--text-muted); line-height: 1.55; display: block; }
.opt .key {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 11px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 5px;
  width: 20px; height: 20px;
  display: grid; place-items: center;
  opacity: .5;
}
@media (hover: none) { .opt .key { display: none; } }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  background: var(--accent);
  color: #fff;
  border: none;
  font: inherit;
  font-size: 17px;
  font-weight: 700;
  padding: 16px 42px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform .15s, background .15s, box-shadow .15s;
  box-shadow: 0 4px 20px -4px var(--accent-glow);
}
.btn:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 10px 28px -4px var(--accent-glow); }
.btn:active { transform: scale(.97); }
.btn.ghost {
  background: transparent;
  color: var(--text-secondary);
  border: 1px solid var(--border);
  box-shadow: none;
  font-weight: 500;
}
.btn.ghost:hover { color: var(--text-primary); border-color: var(--text-muted); background: var(--surface); }
.center { text-align: center; }
.back {
  background: none; border: none; color: var(--text-muted);
  font: inherit; font-size: 13px; cursor: pointer;
  margin-top: 22px; padding: 8px;
  transition: color .15s;
}
.back:hover { color: var(--text-secondary); }

/* ── slot machine interstitial ── */
#s-loading { text-align: center; }
.slot {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 64px;
  padding: 18px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: fit-content;
  margin-inline: auto;
  box-shadow: inset 0 4px 16px rgba(0,0,0,.5), 0 0 40px -10px var(--accent-glow);
  position: relative;
}
.slot::before, .slot::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  height: 26px;
  pointer-events: none;
  z-index: 2;
}
.slot::before { top: 0; background: linear-gradient(var(--surface), transparent); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.slot::after { bottom: 0; background: linear-gradient(transparent, var(--surface)); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
.reel {
  width: 72px; height: 76px;
  overflow: hidden;
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
}
.reel .col {
  display: flex;
  flex-direction: column;
  animation: reelspin .4s linear infinite;
}
.reel:nth-child(2) .col { animation-duration: .32s; }
.reel:nth-child(3) .col { animation-duration: .48s; }
.reel .col span {
  height: 76px;
  display: grid;
  place-items: center;
  font-size: 34px;
}
@keyframes reelspin {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}
.slot-lever {
  font-size: 13px;
  color: var(--text-muted);
  letter-spacing: 4px;
  margin-top: 14px;
}
.loading-msg {
  margin-top: 22px;
  color: var(--text-secondary);
  font-size: 16px;
  min-height: 26px;
  animation: blink 1.4s ease-in-out infinite;
}

/* ── results ── */
.recap {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 22px;
}
.recap span {
  font-size: 12.5px;
  color: var(--text-secondary);
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: 999px;
  padding: 6px 14px;
}
.recap span b { color: var(--accent-hover); font-weight: 600; }

.endorse {
  margin: 0 auto 26px;
  max-width: 480px;
  text-align: center;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
  padding: 14px 20px;
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  position: relative;
}
.endorse::before {
  content: '“';
  position: absolute;
  top: -14px; left: 14px;
  font-size: 42px;
  color: var(--accent);
  font-family: Georgia, serif;
}
.endorse cite {
  display: block;
  margin-top: 6px;
  font-style: normal;
  font-size: 12.5px;
  color: var(--text-muted);
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 20px 18px 16px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  animation: cardin .45s cubic-bezier(.2,.9,.3,1.15) backwards;
  transition: transform .18s, border-color .18s, box-shadow .18s;
}
@keyframes cardin {
  from { opacity: 0; transform: translateY(20px) scale(.95); }
  to { opacity: 1; transform: none; }
}
.card:nth-child(2) { animation-delay: .06s; }
.card:nth-child(3) { animation-delay: .12s; }
.card:nth-child(4) { animation-delay: .18s; }
.card:nth-child(5) { animation-delay: .24s; }
.card:nth-child(6) { animation-delay: .3s; }
.card:hover {
  transform: translateY(-5px);
  border-color: color-mix(in srgb, var(--card-hue, #60a5fa) 45%, var(--border));
  box-shadow: 0 16px 32px -12px rgba(0,0,0,.5), 0 0 24px -12px var(--card-hue, transparent);
}
.card::after {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 60%; height: 100%;
  background: linear-gradient(100deg, transparent, rgba(255,255,255,.035), transparent);
  transform: skewX(-15deg);
  transition: left .5s;
  pointer-events: none;
}
.card:hover::after { left: 130%; }
.card .pic {
  width: 58px; height: 58px;
  display: grid; place-items: center;
  border-radius: 14px;
  background: color-mix(in srgb, currentColor 11%, var(--surface-2));
  font-size: 30px;
  margin-bottom: 14px;
  transition: transform .25s cubic-bezier(.2,.9,.3,1.4);
}
.card:hover .pic { transform: scale(1.12) rotate(-5deg); }
.card .pic.rolling { animation: picroll .12s linear infinite; }
@keyframes picroll {
  0% { transform: translateY(-6px); opacity: .4; }
  50% { transform: translateY(3px); opacity: 1; }
  100% { transform: translateY(-6px); opacity: .4; }
}
.card .name { font-size: 16px; font-weight: 700; margin-bottom: 5px; line-height: 1.4; color: var(--text-primary); }
.card .desc { font-size: 13px; color: var(--text-muted); line-height: 1.65; flex: 1; margin-bottom: 14px; }
.card .price {
  font-size: 14px; font-weight: 700; color: var(--gold);
  font-variant-numeric: tabular-nums;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 7px;
}
.card .price .icon { font-size: 15px; opacity: .85; }
.card .links { display: flex; gap: 8px; }
.card .links a {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  color: var(--text-secondary);
  background: var(--surface-2);
  border-radius: var(--radius-sm);
  padding: 9px 0;
  transition: background .15s, color .15s, transform .15s;
}
.card .links a:hover { background: var(--accent); color: #fff; transform: translateY(-1px); }

.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
  flex-wrap: wrap;
}

/* confetti */
.confetti {
  position: fixed;
  top: -40px;
  pointer-events: none;
  z-index: 99;
  animation: fall linear forwards;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(720deg); opacity: .3; }
}

/* ── 名人全景背景（輪播場景）── */
#bgcele {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.4s ease;
  overflow: hidden;
}
#bgcele.show { opacity: 1; }
#bgcele .celeb {
  position: absolute;
  right: -3vw;
  bottom: -4vh;
  width: min(52vw, 460px);
  opacity: .14;
  animation: sway 7s ease-in-out infinite;
}
#bgcele .scatter {
  position: absolute;
  opacity: .09;
  animation: drift linear infinite;
}
@keyframes sway {
  0%, 100% { transform: rotate(-2deg) translateY(0); }
  50% { transform: rotate(2deg) translateY(-10px); }
}
@keyframes drift {
  from { transform: translateY(-6vh) rotate(0deg); }
  to { transform: translateY(106vh) rotate(360deg); }
}
@media (max-width: 640px) {
  #bgcele .celeb { width: 72vw; right: -12vw; opacity: .09; }
  #bgcele .scatter { opacity: .06; }
}

footer {
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  padding: 20px;
  line-height: 1.9;
  position: relative;
  z-index: 1;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s-' + id).classList.add('active');
  window.scrollTo({ top: 0 });
}

function pick(key, val) {
  state[key] = val;
  if (key === 'tier') go('q2');
  else if (key === 'who') go('q3');
  else diagnose();
}

const slotIcons = ['coin','bill','gem','noodle','headphone','bear','robot','choco','gamepad','duck'];
function diagnose() {
  document.getElementById('slot').innerHTML = [0,1,2].map(() => {
    const col = [...slotIcons].sort(() => Math.random() - .5);
    return `<div class="reel"><div class="col">${col.concat(col).map((g, i) =>
      `<span class="${['h-gold','h-blue','h-pink','h-green','h-purple'][i % 5]}">${svg(g)}</span>`).join('')}</div></div>`;
  }).join('');
  go('loading');
  const msgEl = document.getElementById('loading-msg');
  const msgs = [...loadingLines].sort(() => Math.random() - .5);
  msgEl.textContent = msgs[0];
  setTimeout(() => { msgEl.textContent = msgs[1]; }, 800);
  setTimeout(showResults, 1700);
}

function match(p) {
  return p[4] === state.tier && p[5].includes(state.who) && p[6].includes(state.mood);
}

function showResults() {
  pool = P.filter(match);
  // 同價位帶其他商品當備用池，重抽永遠有新卡可換
  backup = P.filter(p => p[4] === state.tier && !pool.includes(p));
  shown = [];
  rerolls = 0;
  document.getElementById('r-sub').textContent = rand(subLines[state.mood]);
  document.getElementById('r-recap').innerHTML =
    `<span>${svg('moneybag')} 預算 <b>${labels.tier[state.tier]}</b></span>` +
    `<span>${svg('target')} 對象 <b>${labels.who[state.who]}</b></span>` +
    `<span>${svg('brain')} 心情 <b>${labels.mood[state.mood]}</b></span>`;
  const q = rand(quotes);
  document.getElementById('r-quote').innerHTML = `${q[0]}<cite>— ${q[1]}</cite>`;
  setBg(celebOfCite(q[1]) || rand(celebNames));
  draw();
  go('result');
  confetti();
}

const hueHex = { 'h-blue':'#60a5fa','h-gold':'#fbbf24','h-green':'#4ade80','h-pink':'#f472b6','h-purple':'#a78bfa','h-orange':'#fb923c','h-red':'#f87171' };
function draw() {
  // 抽卡優先序：精準命中 → 同價位帶 → 全目錄，通通只出沒看過的
  // 45 個全看完才重置，重抽絕不洗同一批
  const unseen = list => list.filter(p => !shown.includes(p)).sort(() => Math.random() - .5);
  let candidates = unseen(pool);
  if (candidates.length < 6) candidates = candidates.concat(unseen(backup));
  if (candidates.length < 6) candidates = candidates.concat(unseen(P.filter(p => !pool.includes(p) && !backup.includes(p))));
  if (candidates.length === 0) {
    shown = [];
    document.getElementById('r-sub').textContent = '全店 45 樣都給你看完了，錢是有多難花？好，再來一輪。';
    candidates = pool.concat(backup).sort(() => Math.random() - .5);
  }
  const picked = candidates.slice(0, 6);
  shown = shown.concat(picked);
  document.getElementById('r-cards').innerHTML = picked.map(p => `
    <div class="card" style="--card-hue:${hueHex[p[8]] || '#60a5fa'}">
      <div class="pic ${p[8]}">${svg(p[0])}</div>
      <div class="name">${p[1]}</div>
      <div class="desc">${p[2]}</div>
      <div class="price">${svg('card')}${p[3]}</div>
      <div class="links">
        <a href="https://www.momoshop.com.tw/search/searchShop.jsp?keyword=${encodeURIComponent(p[7])}" target="_blank" rel="noopener">momo</a>
        <a href="https://shopee.tw/search?keyword=${encodeURIComponent(p[7])}" target="_blank" rel="noopener">蝦皮</a>
      </div>
    </div>`).join('');
}

  rolling = true;
  rerolls++;
  document.getElementById('r-sub').textContent = rand(rerollLines);
  const q = rand(quotes);
  document.getElementById('r-quote').innerHTML = `${q[0]}<cite>— ${q[1]}</cite>`;
  setBg(celebOfCite(q[1]) || rand(celebNames));
  // 卡片圖示先拉霸式狂轉，再開獎
  const pics = document.querySelectorAll('#r-cards .pic');
  pics.forEach(p => p.classList.add('rolling'));
  const spin = setInterval(() => {
    pics.forEach(p => { p.innerHTML = svg(rand(slotIcons)); });
  }, 90);
  setTimeout(() => {
    clearInterval(spin);
    draw();
    rolling = false;
  }, 750);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.tier = state.who = state.mood = null;
  go('q1');
}

function confetti() {
  if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const icons = ['bill','coin','gem','spark'];
  const hues = ['h-blue','h-gold','h-green','h-pink','h-purple'];
  for (let i = 0; i < 26; i++) {
    const el = document.createElement('span');
    el.className = 'confetti ' + rand(hues);
    el.innerHTML = svg(rand(icons));
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (14 + Math.random() * 14) + 'px';
    el.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
    el.style.animationDelay = (Math.random() * .5) + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

};
let curBg = null;
function setBg(name) {
  if (name === curBg) return;
  const el = document.getElementById('bgcele');
  el.classList.remove('show');
  setTimeout(() => {
    const t = sceneTheme[name];
    let html = '';
    // 主題元素飄落鋪滿全畫面
    for (let i = 0; i < 24; i++) {
      const size = 18 + Math.random() * 30;
      html += `<span class="scatter ${rand(t.hues)}" style="
        left:${Math.random() * 100}vw;
        font-size:${size}px;
        animation-duration:${26 + Math.random() * 30}s;
        animation-delay:-${Math.random() * 40}s;">${svg(rand(t.icons))}</span>`;
    }
    html += `<div class="celeb">${celebs[name]}</div>`;
    el.innerHTML = html;
    curBg = name;
    el.classList.add('show');
  }, 700);
}
function celebOfCite(cite) {
  if (cite.includes('莎士比亞')) return 'shakespeare';
  if (cite.includes('愛因斯坦')) return 'einstein';
  if (cite.includes('巴菲特') || cite.includes('華倫')) return 'buffett';
  if (cite.includes('蘇格拉底')) return 'socrates';
  if (cite.includes('牛頓')) return 'newton';
  return null;
}
setBg(rand(celebNames));

// 鍵盤 1/2/3 選選項,Esc 回上頁
document.addEventListener('keydown', e => {
  const active = document.querySelector('.screen.active');
  if (!active) return;
  if (['1','2','3'].includes(e.key)) {
    const opts = active.querySelectorAll('.opt');
    const target = opts[Number(e.key) - 1];
    if (target) target.click();
  } else if (e.key === 'Escape') {
    const back = active.querySelector('.back');
    if (back) back.click();
  } else if (e.key === 'Enter' && active.id === 's-intro') {
    go('q1');
  }
});
